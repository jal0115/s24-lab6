name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compile
      run: |
        javac -cp .:junit-4.13.2.jar:hamcrest-core-1.3.jar $(find . -name "*.java")

    - name: Run Tests
      run: |
        java -cp .:junit-4.13.2.jar:hamcrest-core-1.3.jar org.junit.runner.JUnitCore \
        edu.cmu.cs.cs214.rec04.InheritanceSortedIntListTest \
        edu.cmu.cs.cs214.rec04.DelegationSortedIntListTest
