- name: Compile
  run: |
    javac -cp ".:Java/lib/SortedIntLists.jar" $(find Java/src/main -name "*.java")

- name: Run Tests (optional)
  run: |
    java -cp ".:Java/lib/SortedIntLists.jar:Java/src/main:Java/src/test" \
    org.junit.runner.JUnitCore \
    edu.cmu.cs.cs214.rec04.InheritanceSortedIntListTest \
    edu.cmu.cs.cs214.rec04.DelegationSortedIntListTest
